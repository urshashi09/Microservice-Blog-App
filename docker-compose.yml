services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin123
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  user-service:
    build:
      context: ./backend/services/user
      dockerfile: ../Dockerfile
    env_file:
      - ./backend/services/user/.env
    environment:
      PORT: 6001
    ports:
      - "6001:6001"
    restart: unless-stopped

  blog-service:
    build:
      context: ./backend/services/blog
      dockerfile: ../Dockerfile
    env_file:
      - ./backend/services/blog/.env
    environment:
      PORT: 7000
      REDIS_URI: redis://redis:6379
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: admin
      RABBITMQ_PASSWORD: admin123
      USER_SERVICE: http://user-service:6001
    ports:
      - "7000:7000"
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      user-service:
        condition: service_started
    restart: unless-stopped

  author-service:
    build:
      context: ./backend/services/author
      dockerfile: ../Dockerfile
    env_file:
      - ./backend/services/author/.env
    environment:
      PORT: 5000
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: admin
      RABBITMQ_PASSWORD: admin123
    ports:
      - "5000:5000"
    depends_on:
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

volumes:
  redis-data:
  rabbitmq-data:
